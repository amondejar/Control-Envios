name: CI (modern)

on:
  push:
    branches: [migracion-blazor-net8]
  pull_request:
    branches: [migracion-blazor-net8, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ControlEnvios.Modern.slnx

      - name: Build
        run: dotnet build ControlEnvios.Modern.slnx --no-restore -c Release

      - name: Test
        run: dotnet test ControlEnvios.Modern.slnx --no-build -c Release --verbosity normal
